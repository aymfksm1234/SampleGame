<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueberry Collector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Blueberry Collector</h1>
      <p>ブルーベリーを育てて収穫し、お金をためて図鑑を埋める放置系ミニゲームです。新種を見つけるほど図鑑がにぎやかになります。</p>
      <div class="stats">
        <div class="stat-card">
          <span class="stat-label">所持金</span>
          <span class="stat-value" id="moneyValue">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">見つけた品種</span>
          <span class="stat-value" id="discoveredValue">0 / 30</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">農夫</span>
          <span class="stat-value" id="farmerValue">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">自動収入</span>
          <span class="stat-value" id="autoValue">0 / 秒</span>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <h2>畑</h2>
        <p id="currentBerryText">まだ何も育っていません。種をまいて、新しい品種を見つけましょう。</p>

        <div class="field">
          <div class="plant" id="plant">
            <div class="soil"></div>
            <div class="stem"></div>
            <div class="leaf left"></div>
            <div class="leaf right"></div>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="growButton">育てる</button>
          <button class="secondary" id="harvestButton" disabled>収穫する</button>
          <button class="tertiary" id="farmerButton">農夫を雇う (20)</button>
          <button class="primary" id="saveButton">進行を保存</button>
        </div>

        <div class="notice" id="notice">最初は「育てる」を押して始めます。</div>
      </div>

      <div class="panel">
        <h2>ブルーベリー図鑑</h2>
        <p>30種類の実在品種を収集できます。未発見の品種はシルエット表示のままです。</p>
        <div class="catalog-grid" id="catalog"></div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
